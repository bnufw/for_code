[features]
codex_hooks = true

[agents.repo-exa-scout]
description = "Scouts repo code, prior failures, and Exa literature to ground one oral-grade deep-learning idea."
config_file = "agents/repo-exa-scout.toml"

[agents.paper-architect]
description = "Shapes one thesis into an oral-grade method skeleton with three innovation points and tight hyperparameter discipline."
config_file = "agents/paper-architect.toml"

[agents.analysis-planner]
description = "Designs the full paper experiment program and the first batch analysis layout."
config_file = "agents/analysis-planner.toml"

[agents.experiment-designer]
description = "Turns one active idea into a repo-native current batch, a new script plan, and an artifact layout."
config_file = "agents/experiment-designer.toml"

[agents.idea-critic]
description = "Challenges the idea with overlap checks, confounders, and a sharper value bar."
config_file = "agents/idea-critic.toml"

[agents.result-judge]
description = "Reads completed-batch evidence and returns improve, abandon, or finish."
config_file = "agents/result-judge.toml"

[agents.improvement-planner]
description = "Turns a completed batch into evidence-backed improvement directions and clarification rounds."
config_file = "agents/improvement-planner.toml"
