[features]
codex_hooks = true
multi_agent = true
child_agents_md = true
default_mode_request_user_input = true

[agents]
max_threads = 3
max_depth = 2

[agents.paper-architect]
description = "Shapes one thesis into the Method section of an oral-grade deep-learning idea."
config_file = "agents/paper-architect.toml"

[agents.theorem-architect]
description = "Produces two non-trivial theorems with full proofs for the active idea and finalizes the Theory hook."
config_file = "agents/theorem-architect.toml"

[agents.experiment-designer]
description = "Designs the Experiment Plan, Current Batch, and runtime fields for one oral-grade idea."
config_file = "agents/experiment-designer.toml"

[agents.result-judge]
description = "Reads completed-batch evidence and returns improve, abandon, or finish."
config_file = "agents/result-judge.toml"

[agents.improvement-planner]
description = "Turns a completed batch into evidence-backed improvement directions and clarification rounds."
config_file = "agents/improvement-planner.toml"
